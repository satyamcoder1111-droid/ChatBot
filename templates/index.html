<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delidel — Sales Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0a0f1a;
    --surface:    #111827;
    --surface2:   #1a2235;
    --border:     #1f2d42;
    --accent:     #00d084;
    --accent-dim: #00d08422;
    --accent2:    #0088ff;
    --text:       #e8edf5;
    --text-dim:   #6b7a99;
    --bot-bg:     #1a2235;
    --user-bg:    #003d26;
    --user-text:  #b8ffd9;
    --danger:     #ff4757;
    --warn:       #ffa502;
    --radius:     16px;
    --font:       'Plus Jakarta Sans', sans-serif;
    --mono:       'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 10;
  }

  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--surface);
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .header-info p {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    margin-top: 1px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .phone-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    width: 140px;
    outline: none;
    transition: border-color 0.2s;
  }
  .phone-input:focus { border-color: var(--accent); }
  .phone-input::placeholder { color: var(--text-dim); }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* MESSAGES AREA */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* BUBBLE */
  .bubble-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 82%;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble-wrap.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .bubble-wrap.bot { align-self: flex-start; }

  .bubble-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 14px;
    position: relative;
    max-width: 100%;
    word-break: break-word;
  }

  .bubble-wrap.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bubble-wrap.user .bubble {
    background: var(--user-bg);
    border: 1px solid #005c3a;
    border-bottom-right-radius: 4px;
    color: var(--user-text);
  }

  .bubble time {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 5px;
    text-align: right;
  }

  /* WhatsApp markdown: *bold* */
  .bubble strong { color: #fff; font-weight: 700; }
  .bubble em { font-style: italic; color: #aac; }

  /* TYPING INDICATOR */
  .typing-wrap {
    display: none;
    align-items: flex-end;
    gap: 8px;
    align-self: flex-start;
    animation: slideIn 0.25s ease;
  }
  .typing-wrap.visible { display: flex; }

  .typing {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* QUICK REPLIES */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 12px;
  }

  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--accent);
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  /* INPUT AREA */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    display: flex;
    align-items: flex-end;
    padding: 10px 16px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }

  #messageInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 0;
  }
  #messageInput::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #00b870);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 2px 12px #00d08440;
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 20px #00d08460; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 20px; height: 20px; }

  /* STAGE BADGE */
  .stage-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stage-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* SYSTEM MESSAGE */
  .sys-msg {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 12px;
    background: var(--surface2);
    border-radius: 20px;
    align-self: center;
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="avatar">🛒</div>
  <div class="header-info">
    <h1>Deli — Delidel Assistant</h1>
    <p>● Online · UAE Food Distribution</p>
  </div>
  <div class="header-right">
    <input class="phone-input" id="senderInput" placeholder="Phone number" value="9759145356">
    <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
  </div>
</div>

<!-- STAGE BAR -->
<div class="stage-bar" id="stageBar">
  <span class="stage-dot"></span>
  <span id="stageLabel">Ready to assist</span>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages">
  <div class="sys-msg">🔒 Conversation is end-to-end encrypted</div>
</div>

<!-- TYPING -->
<div class="typing-wrap" id="typingWrap">
  <div class="bubble-avatar">🛒</div>
  <div class="typing">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- QUICK REPLIES -->
<div class="quick-replies" id="quickReplies">
  <button class="quick-btn" onclick="sendQuick('Hi 👋')">👋 Greet</button>
  <button class="quick-btn" onclick="sendQuick('French Fries 9mm price')">💰 Price check</button>
  <button class="quick-btn" onclick="sendQuick('Cooking Cream available?')">📦 Stock check</button>
  <button class="quick-btn" onclick="sendQuick('Chicken Burger 5 ctns\nFrench Fries 3 ctns\nSausage 2 ctns')">🛒 Multi-order</button>
  <button class="quick-btn" onclick="sendQuick('yes')">✅ Confirm</button>
  <button class="quick-btn" onclick="sendQuick('cancel')">❌ Cancel</button>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="messageInput" placeholder="Type a message…" rows="1"></textarea>
  </div>
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('messageInput');
const typingEl    = document.getElementById('typingWrap');
const stageLabel  = document.getElementById('stageLabel');

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function now() {
  return new Date().toLocaleTimeString('en-AE', { hour: '2-digit', minute: '2-digit' });
}

// Render *bold* and _italic_ WhatsApp markdown
function renderMarkdown(text) {
  return text
    .replace(/\*(.*?)\*/g, '<strong>$1</strong>')
    .replace(/_(.*?)_/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addBubble(text, role) {
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${role}`;

  const avatarHtml = role === 'bot'
    ? '<div class="bubble-avatar">🛒</div>'
    : '';

  wrap.innerHTML = `
    ${avatarHtml}
    <div class="bubble">
      <span>${renderMarkdown(text)}</span>
      <time>${now()}</time>
    </div>`;

  messagesEl.appendChild(wrap);
  scrollDown();
}

function scrollDown() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping()  { typingEl.classList.add('visible');    scrollDown(); }
function hideTyping()  { typingEl.classList.remove('visible'); }

function updateStage(reply) {
  const r = reply.toLowerCase();
  if (r.includes('reply *yes*') || r.includes('type yes'))
    stageLabel.textContent = '⏳ Awaiting confirmation — reply YES or CANCEL';
  else if (r.includes('order received') || r.includes('confirmed'))
    stageLabel.textContent = '✅ Order placed!';
  else if (r.includes('cart') || r.includes('aed'))
    stageLabel.textContent = '🛒 Cart ready';
  else
    stageLabel.textContent = 'Ready to assist';
}

async function sendMessage() {
  const text   = inputEl.value.trim();
  const sender = document.getElementById('senderInput').value.trim() || '9759145356';
  if (!text) return;

  addBubble(text, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';

  showTyping();

  try {
    const res = await fetch('/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, sender_number: sender }),
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || 'Sorry, something went wrong. Please try again. 🙏';
    addBubble(reply, 'bot');
    updateStage(reply);
  } catch (err) {
    hideTyping();
    addBubble('Connection error. Please check the server. 🔌', 'bot');
  }
}

function sendQuick(text) {
  inputEl.value = text;
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  sendMessage();
}

function clearChat() {
  const sysMsgs = messagesEl.querySelectorAll('.sys-msg');
  const bubbles = messagesEl.querySelectorAll('.bubble-wrap');
  bubbles.forEach(b => b.remove());
  stageLabel.textContent = 'Ready to assist';
}
</script>
</body>
</html>
